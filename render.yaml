# =============================================================================
# render.yaml
# =============================================================================
# TADAWUL FAST BRIDGE – RENDER BLUEPRINT (v7.8.0)
# =============================================================================
# Goals
# - Clean, Render-safe blueprint
# - Use requirements.render.txt for build when present
# - Use scripts/start_web.sh as the single startup entrypoint
# - Align env vars with start_web.sh v6.2.0 / config.py v7.2.0 / env.py v7.8.0
# - Keep EODHD as primary provider for non-KSA/global pages
# - Expose all feature flags introduced in env.py v7.8.0
# =============================================================================

previews:
  generation: automatic
  expireAfterDays: 7

services:
  # ===========================================================================
  # WEB SERVICE — FastAPI via scripts/start_web.sh (Gunicorn + UvicornWorker)
  # ===========================================================================
  - type: web
    name: tadawul-fast-bridge
    runtime: python
    region: frankfurt
    plan: pro
    branch: main

    # FIX v7.8.0: /health (was /readyz) — aligns with main.py v8.11.0 built-in routes
    healthCheckPath: /health
    autoDeployTrigger: commit

    buildFilter:
      paths:
        - main.py
        - core/**
        - routes/**
        - scripts/**
        - integrations/**
        - requirements.render.txt
        - requirements.txt
        - runtime.txt
        - render.yaml
      ignoredPaths:
        - tests/**
        - docs/**
        - examples/**
        - .github/**
        - .vscode/**
        - README.md

    buildCommand: |
      set -euo pipefail
      python -m pip install --upgrade pip
      if [ -f requirements.render.txt ]; then
        python -m pip install --no-cache-dir -r requirements.render.txt
      else
        python -m pip install --no-cache-dir -r requirements.txt
      fi
      python -m pip check || true
      python -m compileall -q -f .
      chmod +x scripts/start_web.sh || true

    # FIX v7.8.0: simplified — exec directly (start_web.sh already has set -Eeuo pipefail)
    startCommand: ./scripts/start_web.sh

    scaling:
      minInstances: 1
      maxInstances: 5
      targetMemoryPercent: 80
      targetCPUPercent: 75

    domains:
      - api.tadawulfb.com
      - api.tadawulfastbridge.com

    envVars:
      - fromGroup: tfb-core
      - fromGroup: tfb-logging
      - fromGroup: tfb-server
      - fromGroup: tfb-security
      - fromGroup: tfb-features
      - fromGroup: tfb-providers
      - fromGroup: tfb-cache
      - fromGroup: tfb-sheets
      - fromGroup: tfb-resources

      - key: REDIS_URL
        fromService:
          name: tadawul-redis
          type: keyvalue
          property: connectionString

      # Secrets — set values in Render dashboard only
      - key: APP_TOKEN
        sync: false
      - key: BACKUP_APP_TOKEN
        sync: false
      - key: EODHD_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: ARGAAM_API_KEY
        sync: false
      - key: GOOGLE_SHEETS_CREDENTIALS
        sync: false
      - key: DEFAULT_SPREADSHEET_ID
        sync: false

  # ===========================================================================
  # WORKER SERVICE — Background job processor (scripts/worker.py v4.2.0)
  # Consumes: tfb_background_jobs Redis queue
  # Supported task_type: dashboard_sync | market_scan | refresh_data
  # ===========================================================================
  - type: worker
    name: tadawul-worker
    runtime: python
    region: frankfurt
    plan: starter
    branch: main

    buildCommand: |
      set -euo pipefail
      python -m pip install --upgrade pip
      if [ -f requirements.render.txt ]; then
        python -m pip install --no-cache-dir -r requirements.render.txt
      else
        python -m pip install --no-cache-dir -r requirements.txt
      fi
      python -m pip check || true
      python -m compileall -q -f .

    startCommand: python scripts/worker.py

    envVars:
      - fromGroup: tfb-core
      - fromGroup: tfb-logging
      - fromGroup: tfb-providers
      - fromGroup: tfb-cache
      - fromGroup: tfb-sheets
      - fromGroup: tfb-security

      - key: REDIS_URL
        fromService:
          name: tadawul-redis
          type: keyvalue
          property: connectionString

      - key: APP_TOKEN
        sync: false
      - key: BACKUP_APP_TOKEN
        sync: false
      - key: EODHD_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: ARGAAM_API_KEY
        sync: false
      - key: GOOGLE_SHEETS_CREDENTIALS
        sync: false
      - key: DEFAULT_SPREADSHEET_ID
        sync: false

  # ===========================================================================
  # REDIS — Queue (worker jobs) + Cache backend
  # ===========================================================================
  - type: keyvalue
    name: tadawul-redis
    region: frankfurt
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

# =============================================================================
# ENV VAR GROUPS
# =============================================================================
envVarGroups:

  # ---------------------------------------------------------------------------
  # CORE — identity, Python runtime
  # ---------------------------------------------------------------------------
  - name: tfb-core
    envVars:
      - key: TZ
        value: "Asia/Riyadh"
      - key: APP_NAME
        value: "Tadawul Fast Bridge"
      - key: APP_ENV
        value: "production"
      # FIX v7.8.0: aligned with main.py v8.11.0
      - key: APP_VERSION
        value: "5.3.1"
      - key: SERVICE_VERSION
        value: "8.11.0"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"

  # ---------------------------------------------------------------------------
  # LOGGING — structured logging + tracing
  # FIX v7.8.0: removed UVICORN_ACCESS_LOG (replaced by TFB_ACCESS_LOG in tfb-server)
  # ---------------------------------------------------------------------------
  - name: tfb-logging
    envVars:
      - key: LOG_LEVEL
        value: "INFO"
      - key: LOG_JSON
        value: "1"
      - key: ENABLE_TRACING
        value: "1"
      - key: CORE_TRACING_ENABLED
        value: "1"

  # ---------------------------------------------------------------------------
  # SERVER — aligned with scripts/start_web.sh v6.2.0 env var names
  # FIX v7.8.0:
  #   - HOST → TFB_HOST  (start_web.sh reads TFB_HOST)
  #   - Removed WORKERS_MAX (start_web.sh uses WEB_CONCURRENCY_MAX)
  #   - Replaced UVICORN_* vars with TFB_* equivalents (start_web.sh v2.5.0)
  #   - Added TFB_TIMEOUT, TFB_GRACEFUL_TIMEOUT, TFB_KEEPALIVE, TFB_ACCESS_LOG
  # ---------------------------------------------------------------------------
  - name: tfb-server
    envVars:
      - key: TFB_HOST
        value: "0.0.0.0"
      # Render provides PORT; WEB_CONCURRENCY controls worker count in start_web.sh
      - key: WEB_CONCURRENCY
        value: "1"
      - key: TFB_TIMEOUT
        value: "180"
      - key: TFB_GRACEFUL_TIMEOUT
        value: "45"
      - key: TFB_KEEPALIVE
        value: "10"
      - key: TFB_ACCESS_LOG
        value: "1"

  # ---------------------------------------------------------------------------
  # SECURITY — auth + rate limiting
  # FIX v7.8.0: added ALLOW_QUERY_TOKEN and OPEN_MODE (both aligned with config.py v7.2.0)
  # ---------------------------------------------------------------------------
  - name: tfb-security
    envVars:
      - key: REQUIRE_AUTH
        value: "1"
      - key: OPEN_MODE
        value: "0"
      - key: ALLOW_QUERY_TOKEN
        value: "0"
      - key: AUTH_HEADER_NAME
        value: "X-APP-TOKEN"
      - key: RATE_LIMIT_ENABLED
        value: "1"
      - key: MAX_REQUESTS_PER_MINUTE
        value: "300"

  # ---------------------------------------------------------------------------
  # FEATURES — feature flags (all from env.py v7.8.0 Render Env Audit)
  # FIX v7.8.0: FUNDAMENTALS_ENABLED was missing — caused blank P/E, Market Cap,
  #             Sector, ROE, etc. in Google Sheets output.
  #             All new flags from env.py v7.8.0 added here.
  # ---------------------------------------------------------------------------
  - name: tfb-features
    envVars:
      - key: CACHE_ENABLED
        value: "1"
      # CRITICAL: must be 1 — False blanks all fundamentals in Sheets output
      - key: FUNDAMENTALS_ENABLED
        value: "1"
      - key: COMPUTATIONS_ENABLED
        value: "1"
      - key: SCORING_ENABLED
        value: "1"
      - key: TECHNICALS_ENABLED
        value: "1"
      - key: FORECASTING_ENABLED
        value: "1"
      # Percent format: "points" = backend emits 1.23 meaning 1.23%
      # Only change to "fraction" if backend emits 0.0123 = 1.23%
      - key: TFB_PERCENT_MODE
        value: "points"

  # ---------------------------------------------------------------------------
  # PROVIDERS — data source priority
  # ---------------------------------------------------------------------------
  - name: tfb-providers
    envVars:
      - key: ENABLED_PROVIDERS
        value: "eodhd,finnhub,yahoo_chart,yahoo_fundamentals"
      - key: PRIMARY_PROVIDER
        value: "eodhd"

  # ---------------------------------------------------------------------------
  # CACHE — Redis backend + TTL
  # FIX v7.8.0: CACHE_BACKEND=redis requires REDIS_URL (set via fromService above)
  # ---------------------------------------------------------------------------
  - name: tfb-cache
    envVars:
      - key: CACHE_BACKEND
        value: "redis"
      - key: CACHE_TTL_SEC
        value: "300"
      - key: CACHE_MAX_SIZE
        value: "20000"

  # ---------------------------------------------------------------------------
  # SHEETS — Google Sheets write safety
  # ---------------------------------------------------------------------------
  - name: tfb-sheets
    envVars:
      - key: SHEETS_SAFE_MODE
        value: "strict"
      - key: SHEETS_USE_BATCH_UPDATE
        value: "true"

  # ---------------------------------------------------------------------------
  # RESOURCES — memory management
  # ---------------------------------------------------------------------------
  - name: tfb-resources
    envVars:
      - key: GC_PRESSURE_MB
        value: "512"
