name: 📰 TFB News Archive Collector

# =============================================================================
# Forward-collection clock for Strategy items (b) news->sector and (c) theme
# rotation. Runs news_archive_collector.py ONCE DAILY, snapshots per-symbol
# sentiment for a STABLE universe, and APPENDS one row/symbol/day to the
# News_Archive tab. Idempotent per Riyadh-date (safe to re-run / re-trigger).
#
# Standalone: writes to Google Sheets directly via gspread; does NOT call the
# backend, so it works even if the Render service is asleep or mid-deploy.
#
# WHY: news_intelligence produces sentiment in real time and discards it. You
# cannot backtest "negative sector news precedes underperformance" or "a theme
# precedes rotation" without a HISTORICAL series. This is that series. Value
# accrues over months -- once enough banks, (b)/(c) run through the same
# run_backtest gate as Performance_Log and only THEN may move a recommendation.
# Every day not collected is a day of history you never get back.
#
# REQUIRED GitHub config (the first two ALREADY EXIST for daily_sync.yml):
#   secrets.GOOGLE_SHEETS_CREDENTIALS   service-account JSON (raw or base64)
#   vars.DEFAULT_SPREADSHEET_ID         production spreadsheet id
#   vars.NEWS_ARCHIVE_UNIVERSE          OPTIONAL stable symbol list (space or
#                                       comma separated). Unset -> the script's
#                                       built-in 16-symbol KSA+US default is used.
# =============================================================================

on:
  # Daily at 17:00 UTC = 20:00 Riyadh (after KSA close, into the US session).
  # Adjust the time freely; consistency matters more than the exact hour.
  schedule:
    - cron: "0 17 * * *"

  # Manual trigger. Run with dry_run=true the FIRST time to verify the fetch
  # without writing to the sheet, then run normally (or wait for the schedule).
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (fetch + print sentiment, NO sheet write)"
        required: false
        default: false
        type: boolean
      universe:
        description: "Override universe for this run (space/comma separated)"
        required: false
        type: string

concurrency:
  group: news-archive-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  PYTHON_VERSION: "3.11"
  PYTHONUNBUFFERED: "1"
  TZ: Asia/Riyadh
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  collect-news-archive:
    name: 📰 Collect daily news sentiment
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            requirements.render.txt
            requirements.txt
            requirements.ml.txt

      - name: 📦 Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip setuptools wheel
          if [ -f "requirements.render.txt" ]; then
            python -m pip install -r requirements.render.txt
          elif [ -f "requirements.txt" ]; then
            python -m pip install -r requirements.txt
          else
            echo "::error::No requirements file found (requirements.render.txt or requirements.txt)."
            exit 1
          fi
          # The collector writes via gspread + google-auth; ensure both exist.
          python -c "import gspread, google.auth" 2>/dev/null \
            || python -m pip install -q gspread google-auth

      - name: 📰 Run News Archive Collector
        env:
          PYTHONPATH: ${{ github.workspace }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          DEFAULT_SPREADSHEET_ID: ${{ vars.DEFAULT_SPREADSHEET_ID }}
          NEWS_ARCHIVE_UNIVERSE: ${{ vars.NEWS_ARCHIVE_UNIVERSE }}
          NEWS_ARCHIVE_SHEET: News_Archive
          # Scheduled runs ALWAYS write; the manual dry_run input overrides below.
          NEWS_ARCHIVE_DRY_RUN: "false"
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_UNIVERSE: ${{ github.event.inputs.universe }}
        run: |
          set -euo pipefail

          if [[ -z "${GOOGLE_SHEETS_CREDENTIALS:-}" ]]; then
            echo "::error::secrets.GOOGLE_SHEETS_CREDENTIALS is empty -- set it in repo/environment secrets."
            exit 1
          fi
          if [[ -z "${DEFAULT_SPREADSHEET_ID:-}" ]]; then
            echo "::error::vars.DEFAULT_SPREADSHEET_ID is empty -- set it in repo variables."
            exit 1
          fi

          # Locate the collector (repo root or scripts/).
          if [ -f "news_archive_collector.py" ]; then
            COLLECTOR="news_archive_collector.py"
          elif [ -f "scripts/news_archive_collector.py" ]; then
            COLLECTOR="scripts/news_archive_collector.py"
          else
            echo "::error::news_archive_collector.py not found (looked in root and scripts/)."
            exit 1
          fi
          echo "📄 Collector: $COLLECTOR"

          CMD=(python "$COLLECTOR" --sheet-id "$DEFAULT_SPREADSHEET_ID")

          # Manual DRY-RUN override (the schedule never sets this).
          if [[ "${INPUT_DRY_RUN:-false}" == "true" ]]; then
            CMD+=(--dry-run)
            echo "🧪 Manual DRY-RUN -- no sheet write this run."
          fi

          # Optional per-run universe override (commas normalized to spaces).
          if [[ -n "${INPUT_UNIVERSE:-}" ]]; then
            UNI="${INPUT_UNIVERSE//,/ }"
            # shellcheck disable=SC2206
            EXTRA=(${UNI})
            CMD+=(--universe "${EXTRA[@]}")
            echo "🎯 Universe override: ${EXTRA[*]}"
          fi

          echo "⏱️ Start: $(TZ=Asia/Riyadh date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "📋 Command: ${CMD[*]}"
          "${CMD[@]}"
          echo "✅ News archive collection finished."
