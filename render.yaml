# =============================================================================
# render.yaml
# =============================================================================
# TADAWUL FAST BRIDGE – RENDER BLUEPRINT (v7.5.3) — CLEAN / SPEC-COMPLIANT
# =============================================================================

previews:
  generation: automatic
  expireAfterDays: 7

services:
  - type: web
    name: tadawul-fast-bridge
    runtime: python
    region: frankfurt
    plan: pro
    branch: main

    healthCheckPath: /readyz
    autoDeployTrigger: commit

    buildFilter:
      paths:
        - main.py
        - core/**
        - routes/**
        - scripts/**
        - integrations/**
        - requirements.txt
        - runtime.txt
        - render.yaml
      ignoredPaths:
        - tests/**
        - docs/**
        - examples/**
        - .github/**
        - .vscode/**
        - README.md

    # Keep buildCommand simple; dashboard Build Command can override if you want
    buildCommand: |
      set -euo pipefail
      python -m pip install -U pip
      python -m pip install --no-cache-dir -r requirements.txt
      python -m pip check || true
      python -m compileall -q -f .

    startCommand: |
      set -euo pipefail
      chmod +x scripts/start_web.sh
      exec scripts/start_web.sh

    scaling:
      minInstances: 2
      maxInstances: 10
      targetMemoryPercent: 80
      targetCPUPercent: 75

    domains:
      - api.tadawulfb.com
      - api.tadawulfastbridge.com

    envVars:
      - fromGroup: tfb-core
      - fromGroup: tfb-logging
      - fromGroup: tfb-server
      - fromGroup: tfb-security
      - fromGroup: tfb-features
      - fromGroup: tfb-providers
      - fromGroup: tfb-cache
      - fromGroup: tfb-sheets
      - fromGroup: tfb-resources

      - key: REDIS_URL
        fromService:
          name: tadawul-redis
          type: keyvalue
          property: connectionString

      - key: APP_TOKEN
        sync: false
      - key: BACKUP_APP_TOKEN
        sync: false
      - key: EODHD_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: ARGAAM_API_KEY
        sync: false
      - key: GOOGLE_SHEETS_CREDENTIALS
        sync: false
      - key: DEFAULT_SPREADSHEET_ID
        sync: false

  - type: keyvalue
    name: tadawul-redis
    region: frankfurt
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

envVarGroups:
  - name: tfb-core
    envVars:
      - key: TZ
        value: "Asia/Riyadh"
      - key: APP_NAME
        value: "Tadawul Fast Bridge"
      - key: APP_ENV
        value: "production"
      - key: APP_VERSION
        value: "7.5.3"
      - key: SERVICE_VERSION
        value: "7.5.3"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"

  - name: tfb-logging
    envVars:
      - key: LOG_LEVEL
        value: "INFO"
      - key: LOG_JSON
        value: "1"
      - key: UVICORN_ACCESS_LOG
        value: "1"
      - key: ENABLE_TRACING
        value: "1"
      - key: CORE_TRACING_ENABLED
        value: "1"

  - name: tfb-server
    envVars:
      - key: HOST
        value: "0.0.0.0"
      - key: WORKERS
        value: "4"

  - name: tfb-security
    envVars:
      - key: REQUIRE_AUTH
        value: "1"
      - key: AUTH_HEADER_NAME
        value: "X-APP-TOKEN"
      - key: RATE_LIMIT_ENABLED
        value: "1"
      - key: MAX_REQUESTS_PER_MINUTE
        value: "300"

  - name: tfb-features
    envVars:
      - key: CACHE_ENABLED
        value: "1"

  - name: tfb-providers
    envVars:
      - key: ENABLED_PROVIDERS
        value: "eodhd,finnhub,yahoo_chart,yahoo_fundamentals"
      - key: PRIMARY_PROVIDER
        value: "eodhd"

  - name: tfb-cache
    envVars:
      - key: CACHE_BACKEND
        value: "redis"
      - key: CACHE_TTL_SEC
        value: "300"
      - key: CACHE_MAX_SIZE
        value: "20000"

  - name: tfb-sheets
    envVars:
      - key: SHEETS_SAFE_MODE
        value: "strict"
      - key: SHEETS_USE_BATCH_UPDATE
        value: "true"

  - name: tfb-resources
    envVars:
      - key: GC_PRESSURE_MB
        value: "512"
