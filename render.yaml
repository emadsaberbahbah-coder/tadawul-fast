# =============================================================================
# render.yaml
# =============================================================================
# TADAWUL FAST BRIDGE – RENDER BLUEPRINT (v7.5.4) — CLEAN / SPEC-COMPLIANT
# =============================================================================
# Goals
# - Render-safe: installs deps into Render venv (python -m pip ...)
# - Uses requirements.render.txt when present (recommended), falls back to requirements.txt
# - Keeps start command simple and PORT-safe (scripts/start_web.sh)
# - No debug/hash scanning text in buildCommand
# =============================================================================

previews:
  generation: automatic
  expireAfterDays: 7

services:
  # -------------------------------------------------------------------------
  # 1) Primary FastAPI Web Service
  # -------------------------------------------------------------------------
  - type: web
    name: tadawul-fast-bridge
    runtime: python
    region: frankfurt
    plan: pro
    branch: main

    healthCheckPath: /readyz
    autoDeployTrigger: commit

    buildFilter:
      paths:
        - main.py
        - core/**
        - routes/**
        - scripts/**
        - integrations/**
        - requirements.txt
        - requirements.render.txt
        - runtime.txt
        - render.yaml
      ignoredPaths:
        - tests/**
        - docs/**
        - examples/**
        - .github/**
        - .vscode/**
        - README.md

    buildCommand: |
      set -euo pipefail
      python -m pip install -U pip setuptools wheel

      # Prefer Render-safe dependency set if present
      if [ -f requirements.render.txt ]; then
        echo "Installing requirements.render.txt"
        python -m pip install --no-cache-dir -r requirements.render.txt
      else
        echo "Installing requirements.txt"
        python -m pip install --no-cache-dir -r requirements.txt
      fi

      python -m pip check || true
      python -m compileall -q -f .

      echo "✅ Build completed"

    startCommand: |
      set -euo pipefail
      chmod +x scripts/start_web.sh
      exec scripts/start_web.sh

    scaling:
      minInstances: 2
      maxInstances: 10
      targetMemoryPercent: 80
      targetCPUPercent: 75

    domains:
      - api.tadawulfb.com
      - api.tadawulfastbridge.com

    envVars:
      - fromGroup: tfb-core
      - fromGroup: tfb-logging
      - fromGroup: tfb-server
      - fromGroup: tfb-security
      - fromGroup: tfb-features
      - fromGroup: tfb-providers
      - fromGroup: tfb-cache
      - fromGroup: tfb-sheets
      - fromGroup: tfb-resources

      # Redis connection string from Key Value service
      - key: REDIS_URL
        fromService:
          name: tadawul-redis
          type: keyvalue
          property: connectionString

      # Secrets (kept here so the service can be deployed even if groups are edited)
      - key: APP_TOKEN
        sync: false
      - key: BACKUP_APP_TOKEN
        sync: false
      - key: EODHD_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: ARGAAM_API_KEY
        sync: false
      - key: GOOGLE_SHEETS_CREDENTIALS
        sync: false
      - key: DEFAULT_SPREADSHEET_ID
        sync: false

  # -------------------------------------------------------------------------
  # 2) Redis-Compatible Cache (Render Key Value)
  # -------------------------------------------------------------------------
  - type: keyvalue
    name: tadawul-redis
    region: frankfurt
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru


# =============================================================================
# ENVIRONMENT VARIABLE GROUPS
# =============================================================================
envVarGroups:
  # -------------------------------------------------------------------------
  # CORE
  # -------------------------------------------------------------------------
  - name: tfb-core
    envVars:
      - key: TZ
        value: "Asia/Riyadh"
      - key: APP_NAME
        value: "Tadawul Fast Bridge"
      - key: APP_ENV
        value: "production"
      - key: APP_VERSION
        value: "7.5.4"
      - key: SERVICE_VERSION
        value: "7.5.4"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"

  # -------------------------------------------------------------------------
  # LOGGING / OBSERVABILITY
  # -------------------------------------------------------------------------
  - name: tfb-logging
    envVars:
      - key: LOG_LEVEL
        value: "INFO"
      - key: LOG_JSON
        value: "1"
      - key: UVICORN_ACCESS_LOG
        value: "1"
      - key: ENABLE_TRACING
        value: "1"
      - key: CORE_TRACING_ENABLED
        value: "1"

  # -------------------------------------------------------------------------
  # SERVER (keep minimal; scripts/start_web.sh honors PORT automatically)
  # -------------------------------------------------------------------------
  - name: tfb-server
    envVars:
      - key: HOST
        value: "0.0.0.0"
      # Use Render-safe naming: WEB_CONCURRENCY is what most launchers expect
      - key: WEB_CONCURRENCY
        value: "1"
      # Hard clamp in launcher (if you keep it) with WORKERS_MAX
      - key: WORKERS_MAX
        value: "4"
      - key: UVICORN_KEEPALIVE
        value: "75"
      - key: UVICORN_GRACEFUL_TIMEOUT
        value: "30"
      - key: UVICORN_BACKLOG
        value: "2048"

  # -------------------------------------------------------------------------
  # SECURITY
  # -------------------------------------------------------------------------
  - name: tfb-security
    envVars:
      - key: REQUIRE_AUTH
        value: "1"
      - key: AUTH_HEADER_NAME
        value: "X-APP-TOKEN"
      - key: RATE_LIMIT_ENABLED
        value: "1"
      - key: MAX_REQUESTS_PER_MINUTE
        value: "300"

  # -------------------------------------------------------------------------
  # FEATURES
  # -------------------------------------------------------------------------
  - name: tfb-features
    envVars:
      - key: CACHE_ENABLED
        value: "1"

  # -------------------------------------------------------------------------
  # PROVIDERS
  # -------------------------------------------------------------------------
  - name: tfb-providers
    envVars:
      - key: ENABLED_PROVIDERS
        value: "eodhd,finnhub,yahoo_chart,yahoo_fundamentals"
      - key: PRIMARY_PROVIDER
        value: "eodhd"

  # -------------------------------------------------------------------------
  # CACHE
  # -------------------------------------------------------------------------
  - name: tfb-cache
    envVars:
      - key: CACHE_BACKEND
        value: "redis"
      - key: CACHE_TTL_SEC
        value: "300"
      - key: CACHE_MAX_SIZE
        value: "20000"

  # -------------------------------------------------------------------------
  # SHEETS
  # -------------------------------------------------------------------------
  - name: tfb-sheets
    envVars:
      - key: SHEETS_SAFE_MODE
        value: "strict"
      - key: SHEETS_USE_BATCH_UPDATE
        value: "true"

  # -------------------------------------------------------------------------
  # RESOURCES
  # -------------------------------------------------------------------------
  - name: tfb-resources
    envVars:
      - key: GC_PRESSURE_MB
        value: "512"
