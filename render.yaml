# =============================================================================
# render.yaml
# =============================================================================
# TADAWUL FAST BRIDGE – RENDER BLUEPRINT (v7.8.0)
# =============================================================================
# Goals
# - Clean, Render-safe blueprint
# - Use requirements.render.txt for build when present
# - Use scripts/start_web.sh as the single startup entrypoint
# - Align env vars with the simplified start_web.sh
# - Keep EODHD as primary provider for non-KSA/global pages
# =============================================================================

previews:
  generation: automatic
  expireAfterDays: 7

services:
  # ===========================================================================
  # WEB SERVICE — FastAPI via Gunicorn + UvicornWorker
  # ===========================================================================
  - type: web
    name: tadawul-fast-bridge
    runtime: python
    region: frankfurt
    plan: pro
    branch: main

    healthCheckPath: /health
    autoDeployTrigger: commit

    buildFilter:
      paths:
        - main.py
        - core/**
        - routes/**
        - scripts/**
        - integrations/**
        - requirements.render.txt
        - requirements.txt
        - runtime.txt
        - render.yaml
      ignoredPaths:
        - tests/**
        - docs/**
        - examples/**
        - .github/**
        - .vscode/**
        - README.md

    buildCommand: |
      set -euo pipefail
      python -m pip install --upgrade pip
      if [ -f requirements.render.txt ]; then
        python -m pip install --no-cache-dir -r requirements.render.txt
      else
        python -m pip install --no-cache-dir -r requirements.txt
      fi
      python -m pip check || true
      python -m compileall -q -f .
      chmod +x scripts/start_web.sh || true

    startCommand: ./scripts/start_web.sh

    scaling:
      minInstances: 1
      maxInstances: 5
      targetMemoryPercent: 80
      targetCPUPercent: 75

    domains:
      - api.tadawulfb.com
      - api.tadawulfastbridge.com

    envVars:
      - fromGroup: tfb-core
      - fromGroup: tfb-logging
      - fromGroup: tfb-server
      - fromGroup: tfb-security
      - fromGroup: tfb-features
      - fromGroup: tfb-providers
      - fromGroup: tfb-cache
      - fromGroup: tfb-sheets
      - fromGroup: tfb-resources

      - key: REDIS_URL
        fromService:
          name: tadawul-redis
          type: keyvalue
          property: connectionString

      # Secrets — set values in Render dashboard only
      - key: APP_TOKEN
        sync: false
      - key: BACKUP_APP_TOKEN
        sync: false
      - key: EODHD_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: ARGAAM_API_KEY
        sync: false
      - key: GOOGLE_SHEETS_CREDENTIALS
        sync: false
      - key: DEFAULT_SPREADSHEET_ID
        sync: false

  # ===========================================================================
  # WORKER SERVICE — Background job processor
  # ===========================================================================
  - type: worker
    name: tadawul-worker
    runtime: python
    region: frankfurt
    plan: starter
    branch: main

    buildCommand: |
      set -euo pipefail
      python -m pip install --upgrade pip
      if [ -f requirements.render.txt ]; then
        python -m pip install --no-cache-dir -r requirements.render.txt
      else
        python -m pip install --no-cache-dir -r requirements.txt
      fi
      python -m pip check || true
      python -m compileall -q -f .

    startCommand: python scripts/worker.py

    envVars:
      - fromGroup: tfb-core
      - fromGroup: tfb-logging
      - fromGroup: tfb-providers
      - fromGroup: tfb-cache
      - fromGroup: tfb-sheets
      - fromGroup: tfb-security

      - key: REDIS_URL
        fromService:
          name: tadawul-redis
          type: keyvalue
          property: connectionString

      - key: APP_TOKEN
        sync: false
      - key: BACKUP_APP_TOKEN
        sync: false
      - key: EODHD_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: ARGAAM_API_KEY
        sync: false
      - key: GOOGLE_SHEETS_CREDENTIALS
        sync: false
      - key: DEFAULT_SPREADSHEET_ID
        sync: false

  # ===========================================================================
  # REDIS — Queue + Cache
  # ===========================================================================
  - type: keyvalue
    name: tadawul-redis
    region: frankfurt
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

# =============================================================================
# ENV VAR GROUPS
# =============================================================================
envVarGroups:
  - name: tfb-core
    envVars:
      - key: TZ
        value: "Asia/Riyadh"
      - key: APP_NAME
        value: "Tadawul Fast Bridge"
      - key: APP_ENV
        value: "production"
      - key: APP_VERSION
        value: "5.3.1"
      - key: SERVICE_VERSION
        value: "8.10.0"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"

  - name: tfb-logging
    envVars:
      - key: LOG_LEVEL
        value: "INFO"
      - key: LOG_JSON
        value: "1"
      - key: ENABLE_TRACING
        value: "1"
      - key: CORE_TRACING_ENABLED
        value: "1"

  - name: tfb-server
    envVars:
      - key: TFB_HOST
        value: "0.0.0.0"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: TFB_TIMEOUT
        value: "180"
      - key: TFB_GRACEFUL_TIMEOUT
        value: "45"
      - key: TFB_KEEPALIVE
        value: "10"
      - key: TFB_ACCESS_LOG
        value: "1"

  - name: tfb-security
    envVars:
      - key: REQUIRE_AUTH
        value: "1"
      - key: AUTH_HEADER_NAME
        value: "X-APP-TOKEN"
      - key: RATE_LIMIT_ENABLED
        value: "1"
      - key: MAX_REQUESTS_PER_MINUTE
        value: "300"

  - name: tfb-features
    envVars:
      - key: CACHE_ENABLED
        value: "1"

  - name: tfb-providers
    envVars:
      - key: ENABLED_PROVIDERS
        value: "eodhd,finnhub,yahoo_chart,yahoo_fundamentals"
      - key: PRIMARY_PROVIDER
        value: "eodhd"

  - name: tfb-cache
    envVars:
      - key: CACHE_BACKEND
        value: "redis"
      - key: CACHE_TTL_SEC
        value: "300"
      - key: CACHE_MAX_SIZE
        value: "20000"

  - name: tfb-sheets
    envVars:
      - key: SHEETS_SAFE_MODE
        value: "strict"
      - key: SHEETS_USE_BATCH_UPDATE
        value: "true"

  - name: tfb-resources
    envVars:
      - key: GC_PRESSURE_MB
        value: "512"
