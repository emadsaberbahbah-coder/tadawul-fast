# ============================================================================
# TADAWUL FAST BRIDGE -- RENDER BLUEPRINT (v1.1.1)
# ============================================================================
# Revised notes
# -------------
# - Keeps your current Render-safe deployment structure
# - Preserves Redis wiring, startup command, health check, and feature flags
# - Keeps LOG_JSON and GOOGLE_SHEETS_CREDENTIALS naming aligned
# - No structural issue found here; main deploy blocker was requirements.txt
# ============================================================================

previews:
  generation: off

services:

  # --------------------------------------------------------------------------
  # Redis keyvalue store
  # --------------------------------------------------------------------------
  - type: keyvalue
    name: tadawul-fast-bridge-redis
    region: frankfurt
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  # --------------------------------------------------------------------------
  # Web service
  # --------------------------------------------------------------------------
  - type: web
    name: tadawul-fast-bridge
    runtime: python
    branch: main
    region: frankfurt
    plan: starter
    rootDir: .
    autoDeployTrigger: commit

    buildFilter:
      paths:
        - "**/*.py"
        - "requirements.txt"
        - "requirements-*.txt"
        - "pyproject.toml"
        - "poetry.lock"
        - "uv.lock"
        - "scripts/**/*.sh"
        - "scripts/**/*.py"
        - "render.yaml"
        - "Procfile"
        - "runtime.txt"
        - ".python-version"
      ignoredPaths:
        - "**/*.md"
        - "docs/**"
        - "**/*.example.*"
        - ".env.example"
        - ".gitignore"
        - ".github/**"
        - "notebooks/**"
        - "data/samples/**"
        - "data/examples/**"

    buildCommand: |
      python -m pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt
      chmod +x scripts/start_web.sh

    startCommand: ./scripts/start_web.sh
    healthCheckPath: /readyz

    envVars:
      # ----------------------------------------------------------------------
      # Core app identity
      # ----------------------------------------------------------------------
      - key: APP_ENV
        value: production
      - key: APP_NAME
        value: Tadawul Fast Bridge
      - key: APP_VERSION
        value: "8.11.1"
      - key: SERVICE_VERSION
        value: "8.11.1"
      - key: TZ
        value: Asia/Riyadh

      # ----------------------------------------------------------------------
      # Python runtime tuning
      # ----------------------------------------------------------------------
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: PIP_NO_CACHE_DIR
        value: "1"

      # ----------------------------------------------------------------------
      # Logging
      # ----------------------------------------------------------------------
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_JSON
        value: "true"

      # ----------------------------------------------------------------------
      # Gunicorn / Uvicorn
      # ----------------------------------------------------------------------
      - key: WEB_CONCURRENCY
        value: "2"
      - key: GUNICORN_TIMEOUT
        value: "180"
      - key: GUNICORN_KEEPALIVE
        value: "30"

      # ----------------------------------------------------------------------
      # Redis connection
      # ----------------------------------------------------------------------
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: tadawul-fast-bridge-redis
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: tadawul-fast-bridge-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: tadawul-fast-bridge-redis
          property: port
      - key: CACHE_BACKEND
        value: redis

      # ----------------------------------------------------------------------
      # Feature flags
      # ----------------------------------------------------------------------
      - key: FUNDAMENTALS_ENABLED
        value: "true"
      - key: COMPUTATIONS_ENABLED
        value: "true"
      - key: SCORING_ENABLED
        value: "true"
      - key: TECHNICALS_ENABLED
        value: "true"
      - key: FORECASTING_ENABLED
        value: "true"
      - key: AI_ANALYSIS_ENABLED
        value: "true"
      - key: ADVANCED_ANALYSIS_ENABLED
        value: "true"
      - key: ADVISOR_ENABLED
        value: "true"
      - key: TFB_PERCENT_MODE
        value: points

      # ----------------------------------------------------------------------
      # Rate limiting + HTTP tuning
      # ----------------------------------------------------------------------
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: MAX_REQUESTS_PER_MINUTE
        value: "240"
      - key: HTTP_TIMEOUT_SEC
        value: "45"

      # ----------------------------------------------------------------------
      # FastAPI entrypoint behavior
      # ----------------------------------------------------------------------
      - key: PRESTART_MOUNT_ROUTES
        value: "true"
      - key: INIT_ENGINE_ON_BOOT
        value: "true"
      - key: INIT_ENGINE_STRICT
        value: "false"
      - key: ROUTES_STRICT_IMPORT
        value: "false"
      - key: ENABLE_SWAGGER
        value: "true"
      - key: ENABLE_REDOC
        value: "true"

      # ----------------------------------------------------------------------
      # Auth configuration
      # ----------------------------------------------------------------------
      - key: AUTH_HEADER_NAME
        value: X-APP-TOKEN
      - key: REQUIRE_AUTH
        value: "true"
      - key: OPEN_MODE
        value: "false"
      - key: ALLOW_QUERY_TOKEN
        value: "false"
      - key: APP_TOKEN
        sync: false
      - key: BACKUP_APP_TOKEN
        sync: false

      # ----------------------------------------------------------------------
      # Provider API keys
      # ----------------------------------------------------------------------
      - key: EODHD_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false

      # ----------------------------------------------------------------------
      # OpenAI
      # ----------------------------------------------------------------------
      - key: OPENAI_API_KEY
        sync: false

      # ----------------------------------------------------------------------
      # Google Sheets integration
      # ----------------------------------------------------------------------
      - key: GOOGLE_SHEETS_CREDENTIALS
        sync: false
      - key: DEFAULT_SPREADSHEET_ID
        sync: false

      # ----------------------------------------------------------------------
      # CORS
      # ----------------------------------------------------------------------
      - key: ENABLE_CORS_ALL_ORIGINS
        value: "false"
      - key: CORS_ORIGINS
        value: ""
