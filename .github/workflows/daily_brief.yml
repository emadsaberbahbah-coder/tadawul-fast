# =============================================================================
# Daily Investment Brief — "Emad Bahbah" morning email
# -----------------------------------------------------------------------------
# WHAT: runs scripts/run_daily_brief.py --send, which reads the decision +
#       opportunity + market pages from the production workbook (READ-ONLY) and
#       emails a polished HTML brief. Script v1.4.0 also ATTACHES a PDF copy
#       of the recommendations (needs reportlab, installed below for this job
#       only — NOT added to Render requirements; TFB_BRIEF_PDF=0 disables).
# WHEN: FOUR sends per day, Sunday–Thursday (GitHub cron is UTC; Riyadh = UTC+3,
#       no DST in KSA so the Riyadh times hold year-round):
#         07:30 UTC = 10:30 Riyadh — Tadawul just opened: local + GCC review
#         10:30 UTC = 13:30 Riyadh — midday local + GCC review
#         15:00 UTC = 18:00 Riyadh — evening: global/US session view
#         19:00 UTC = 22:00 Riyadh — pre-US-close wrap
#       Can also be run manually at any time (preview by default, see below).
# WHY 4x (2026-07-05): owner request — single 09:00 Riyadh send replaced with
#       the four decision-relevant checkpoints above. Day-of-week 0-4 = Sun–Thu
#       kept for all four slots (Tadawul work-week). Note: this means no Friday
#       evening brief while the US session trades, and Sunday evening briefs
#       show Thursday's US closes; switch the last two crons to "* * 1-5" if
#       US-day alignment is ever preferred.
# WHY shaped like this: it mirrors track_performance.yml exactly — same Python,
#       same PYTHONPATH (so `integrations.*` / `core.*` imports resolve from a
#       scripts/ file), same sheet-id source (repo variable DEFAULT_SPREADSHEET_ID)
#       and same Google credential secret. Email transport adds three secrets:
#       TFB_MAIL_FROM / TFB_MAIL_PASSWORD / TFB_MAIL_TO.
# NOTE: this workflow only READS the sheet. It never writes, so it cannot affect
#       the sync, the cockpits, or any page.
# =============================================================================
name: 📨 Daily Investment Brief

on:
  schedule:
    # 07:30 UTC == 10:30 Asia/Riyadh, Sun–Thu — Tadawul open, local + GCC.
    - cron: "30 7 * * 0-4"
    # 10:30 UTC == 13:30 Asia/Riyadh, Sun–Thu — midday local + GCC.
    - cron: "30 10 * * 0-4"
    # 15:00 UTC == 18:00 Asia/Riyadh, Sun–Thu — evening global/US view.
    - cron: "0 15 * * 0-4"
    # 19:00 UTC == 22:00 Asia/Riyadh, Sun–Thu — pre-US-close wrap.
    - cron: "0 19 * * 0-4"
  workflow_dispatch:
    inputs:
      # 2026-07-03 PREVIEW-BY-DEFAULT: default was `true`, so every manual
      # "Run workflow" click SENT a real email — each test/verification
      # dispatch produced a duplicate brief in the inbox. Scheduled runs are
      # untouched (they never read inputs and always send); a manual click now
      # renders + uploads the HTML artifact only, unless send is explicitly
      # ticked. Mirrors digest.yml's dry_run-by-default manual behavior.
      send:
        description: "Actually email the brief? (default: preview only — renders the HTML artifact, sends nothing)"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  PYTHON_VERSION: "3.11"
  PYTHONUNBUFFERED: 1
  TZ: Asia/Riyadh
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  brief:
    name: 📨 Render & email the daily brief
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v7

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [[ -f requirements.render.txt ]]; then
            python -m pip install -r requirements.render.txt
          else
            python -m pip install -r requirements.txt
          fi
          # v1.4.0 PDF attachment (brief job only — deliberately NOT in Render deps)
          python -m pip install "reportlab>=4.0"

      - name: 🔎 Resolve spreadsheet id
        id: sheet
        env:
          VAR_SHEET: ${{ vars.DEFAULT_SPREADSHEET_ID }}
        run: |
          SID="${VAR_SHEET:-}"
          if [[ -z "$SID" ]]; then
            echo "::error::Spreadsheet ID empty. Set repository variable DEFAULT_SPREADSHEET_ID."
            exit 1
          fi
          echo "sid=$SID" >> "$GITHUB_OUTPUT"

      - name: 📨 Render & send brief
        env:
          PYTHONPATH: ${{ github.workspace }}
          DEFAULT_SPREADSHEET_ID: ${{ steps.sheet.outputs.sid }}
          # GOOGLE_SHEETS_CREDENTIALS accepts JSON or base64(JSON); prefer the JSON secret.
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS != '' && secrets.GOOGLE_SHEETS_CREDENTIALS || secrets.GOOGLE_SHEETS_CREDENTIALS_B64 }}
          TFB_BRIEF_OWNER_NAME: "Emad Bahbah"
          TFB_MAIL_FROM: ${{ secrets.TFB_MAIL_FROM }}
          TFB_MAIL_PASSWORD: ${{ secrets.TFB_MAIL_PASSWORD }}
          TFB_MAIL_TO: ${{ secrets.TFB_MAIL_TO }}
        run: |
          if [[ -z "${GOOGLE_SHEETS_CREDENTIALS:-}" ]]; then
            echo "::error::No Google credentials. Set secret GOOGLE_SHEETS_CREDENTIALS (JSON) or GOOGLE_SHEETS_CREDENTIALS_B64."
            exit 1
          fi
          # 2026-07-03 PREVIEW-BY-DEFAULT: schedule always sends; a manual
          # dispatch sends ONLY when send=true was explicitly chosen. Any other
          # value (false, empty, missing) previews — safer than string-matching
          # "false" alone, which would still send on an empty input.
          SEND_FLAG="--send"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.send }}" != "true" ]]; then
            SEND_FLAG=""
            echo "Preview mode — rendering only, no email will be sent (set send=true to send)."
          fi
          python scripts/run_daily_brief.py --out daily_brief.html $SEND_FLAG

      - name: 📎 Upload rendered brief (for the record)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: daily-brief-${{ github.run_id }}
          path: |
            daily_brief.html
            daily_brief.pdf
          if-no-files-found: ignore
          retention-days: 14
