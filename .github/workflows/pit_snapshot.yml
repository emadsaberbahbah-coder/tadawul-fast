name: "🗄️ TFB PIT Snapshot"

# v1.0.0 (W-6, Execution Plan v2.1). Appends the daily point-in-time
# fundamentals + engine-output snapshot for the decision symbols to
# _PIT_Fundamentals — append-only, duplicate-proof, off the request path.
# "Every unarchived day is evidence lost forever" — this starts the archive.

on:
  schedule:
    - cron: "10 20 * * *"     # ~23:10 Riyadh — after the US close, one canonical snapshot/day
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true = print rows, write nothing"
        default: "false"

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DEFAULT_SPREADSHEET_ID: ${{ vars.DEFAULT_SPREADSHEET_ID }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --quiet gspread google-auth

      - name: Materialize Google credentials
        env:
          SECRET_CREDS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          SECRET_CREDS_B64: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_B64 }}
        run: |
          set -euo pipefail
          CREDS_PATH="$RUNNER_TEMP/gcreds.json"
          if [[ -n "${SECRET_CREDS:-}" ]]; then
            printf '%s' "$SECRET_CREDS" > "$CREDS_PATH"
          elif [[ -n "${SECRET_CREDS_B64:-}" ]]; then
            printf '%s' "$SECRET_CREDS_B64" | base64 -d > "$CREDS_PATH"
          else
            echo "::error::No Google credentials secret present."; exit 1
          fi
          echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDS_PATH" >> "$GITHUB_ENV"

      - name: Run PIT snapshot
        run: |
          set -euo pipefail
          EXTRA="--write"
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then EXTRA="--dry-run"; fi
          python scripts/pit_snapshot.py $EXTRA
