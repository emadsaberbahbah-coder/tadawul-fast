# -------------------------------------------------------------------------
      # 📊 Capture Per-Step Metrics (optional JSON emitted by sync runner)
      # -------------------------------------------------------------------------
      # If scripts/run_dashboard_sync.py writes sync_summary.json, we surface
      # per-step results. Otherwise we fall back to sensible defaults.
      - name: 📊 Parse Per-Step Metrics
        id: metrics
        if: always()
        run: |
          set -euo pipefail
          SUMMARY_FILE="sync_summary.json"

          # Defaults
          MARKET_EXIT="skipped";     MARKET_DURATION="0"
          PORTFOLIO_EXIT="skipped";  PORTFOLIO_DURATION="0"
          INSIGHTS_EXIT="skipped";   INSIGHTS_DURATION="0"
          POST_FAILURES="0"
          DRIFT_RAN="false"

          if [[ -f "$SUMMARY_FILE" ]] && jq empty "$SUMMARY_FILE" >/dev/null 2>&1; then
            MARKET_EXIT="$(jq -r     '.steps.market.exit     // "skipped"' "$SUMMARY_FILE")"
            MARKET_DURATION="$(jq -r '.steps.market.duration // 0'         "$SUMMARY_FILE")"
            PORTFOLIO_EXIT="$(jq -r     '.steps.portfolio.exit     // "skipped"' "$SUMMARY_FILE")"
            PORTFOLIO_DURATION="$(jq -r '.steps.portfolio.duration // 0'         "$SUMMARY_FILE")"
            INSIGHTS_EXIT="$(jq -r     '.steps.insights.exit     // "skipped"' "$SUMMARY_FILE")"
            INSIGHTS_DURATION="$(jq -r '.steps.insights.duration // 0'         "$SUMMARY_FILE")"
            POST_FAILURES="$(jq -r '.post_validation.failures // 0'     "$SUMMARY_FILE")"
            DRIFT_RAN="$(jq -r     '.drift_detection.ran     // false' "$SUMMARY_FILE")"
            echo "✅ Loaded per-step metrics from $SUMMARY_FILE"
          else
            echo "ℹ️  No sync_summary.json found — using defaults"
          fi

          {
            echo "market_exit=$MARKET_EXIT"
            echo "market_duration=$MARKET_DURATION"
            echo "portfolio_exit=$PORTFOLIO_EXIT"
            echo "portfolio_duration=$PORTFOLIO_DURATION"
            echo "insights_exit=$INSIGHTS_EXIT"
            echo "insights_duration=$INSIGHTS_DURATION"
            echo "post_failures=$POST_FAILURES"
            echo "drift_ran=$DRIFT_RAN"
          } >> "$GITHUB_OUTPUT"

      # -------------------------------------------------------------------------
      # 📝 Generate Step Summary
      # -------------------------------------------------------------------------
      - name: 📝 Generate Summary
        if: always()
        env:
          STATUS: ${{ job.status }}
          DURATION: ${{ steps.execute_sync.outputs.duration || '0' }}
          HEALTH:   ${{ steps.health_check.outputs.health_status || 'Unknown' }}
          M_EXIT:   ${{ steps.metrics.outputs.market_exit }}
          M_DUR:    ${{ steps.metrics.outputs.market_duration }}
          P_EXIT:   ${{ steps.metrics.outputs.portfolio_exit }}
          P_DUR:    ${{ steps.metrics.outputs.portfolio_duration }}
          I_EXIT:   ${{ steps.metrics.outputs.insights_exit }}
          I_DUR:    ${{ steps.metrics.outputs.insights_duration }}
          POST_FAIL: ${{ steps.metrics.outputs.post_failures }}
          DRIFT:    ${{ steps.metrics.outputs.drift_ran }}
        run: |
          set -euo pipefail
          RIYADH_TIME="$(TZ=Asia/Riyadh date '+%Y-%m-%d %H:%M:%S %Z')"
          if [[ "$STATUS" == "success" ]]; then
            STATUS_ICON="✅ **SUCCESS**"
          else
            STATUS_ICON="❌ **FAILED**"
          fi

          # Unquoted heredoc → bash expands $VARS natively; no sed needed.
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          # 🏦 Tadawul Dashboard Sync Report

          ## 📋 Execution Overview
          | Metric | Value |
          | :--- | :--- |
          | **Status** | $STATUS_ICON |
          | **Trigger** | \`${{ github.event_name }}\` |
          | **Time (Riyadh)** | \`$RIYADH_TIME\` |
          | **Run Mode** | \`${{ env.RUN_MODE }}\` |
          | **Total Duration** | \`${DURATION}s\` |

          ## 🎯 Target
          * **Sheet ID:** \`${{ env.TARGET_SHEET_ID }}\`
          * **Backend:** \`${{ env.TARGET_URL }}\` *(Health: $HEALTH)*

          ## 🔑 SYNC_KEYS
          \`\`\`text
          ${{ env.SYNC_KEYS }}
          \`\`\`

          ## ⚙️ Per-Step Results
          | Step | Exit | Duration |
          | :--- | :--- | :------- |
          | Market Pages | $M_EXIT | ${M_DUR}s |
          | My_Portfolio | $P_EXIT | ${P_DUR}s |
          | Insights_Analysis | $I_EXIT | ${I_DUR}s |
          | Post-Validation Warnings | $POST_FAIL | — |
          | Drift Detection | $DRIFT | — |
          EOF

      # -------------------------------------------------------------------------
      # 📤 Upload Logs + Summary Artifact
      # -------------------------------------------------------------------------
      - name: 📤 Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tadawul-sync-logs-${{ github.run_id }}
          path: |
            sync_*.log
            sync_execution.log
            sync_summary.json
          retention-days: 7
          compression-level: 6
          if-no-files-found: warn

      # -------------------------------------------------------------------------
      # 🔔 Slack Notification on Failure (Block Kit)
      # -------------------------------------------------------------------------
      - name: 🔔 Notify on Failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_MODE:  ${{ env.RUN_MODE }}
          SYNC_KEYS: ${{ env.SYNC_KEYS }}
        run: |
          set -euo pipefail
          if [[ -z "${SLACK_WEBHOOK_URL:-}" ]]; then
            echo "ℹ️  No Slack webhook configured; skipping notification."
            exit 0
          fi

          RIYADH_TIME="$(TZ=Asia/Riyadh date '+%Y-%m-%d %H:%M:%S %Z')"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          PAYLOAD="$(jq -n \
            --arg trigger "${{ github.event_name }}" \
            --arg time    "$RIYADH_TIME" \
            --arg mode    "${RUN_MODE:-unknown}" \
            --arg keys    "${SYNC_KEYS:-unknown}" \
            --arg url     "$RUN_URL" \
            '{
              text: "❌ Tadawul Dashboard Sync FAILED",
              attachments: [{
                color: "danger",
                fields: [
                  {title: "Trigger",        value: $trigger, short: true},
                  {title: "Time (Riyadh)",  value: $time,    short: true},
                  {title: "Mode",           value: $mode,    short: true},
                  {title: "Schema",         value: "v3.0.0", short: true},
                  {title: "Pages",          value: $keys,    short: false},
                  {title: "Details",        value: ("<" + $url + "|View Logs>"), short: false}
                ]
              }]
            }')"

          if curl -sf -X POST "$SLACK_WEBHOOK_URL" \
               -H "Content-Type: application/json" \
               --data-raw "$PAYLOAD" >/dev/null; then
            echo "✅ Slack notification sent"
          else
            echo "::warning::Slack notification failed to send (non-fatal)"
          fi

      # -------------------------------------------------------------------------
      # 🧹 Secure Cleanup (credentials wipe)
      # -------------------------------------------------------------------------
      - name: 🧹 Secure Cleanup
        if: always()
        run: |
          set -euo pipefail
          echo "::group::Cleanup"
          CREDS_PATH="${GOOGLE_APPLICATION_CREDENTIALS:-${{ runner.temp }}/google_credentials.json}"
          if [[ -n "$CREDS_PATH" && -f "$CREDS_PATH" ]]; then
            if command -v shred >/dev/null 2>&1; then
              shred -u -z "$CREDS_PATH" 2>/dev/null || rm -f "$CREDS_PATH"
            else
              rm -f "$CREDS_PATH"
            fi
            echo "✅ Credentials securely removed: $CREDS_PATH"
          else
            echo "ℹ️  No credentials file to remove"
          fi
          echo "::endgroup::"
