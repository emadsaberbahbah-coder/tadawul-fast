name: 🏦 Tadawul Dashboard Advanced Sync

on:
  # ✅ CI quality gate
  pull_request:
  push:
    branches: [main, master]

  # ✅ Production scheduler (UTC; Riyadh UTC+3)
  schedule:
    - cron: "0,15,30,45 * * * *"

  # ✅ Manual run
  workflow_dispatch:
    inputs:
      backend_url:
        description: "🌐 Backend URL Override"
        required: false
        type: string
      sheet_id:
        description: "📊 Spreadsheet ID Override"
        required: false
        type: string
      run_mode:
        description: "🚀 Execution Mode"
        required: true
        default: "full_sync"
        type: choice
        options: [full_sync, health_only, single_key]
      single_key:
        description: "🔑 Specific Key (if single_key mode)"
        required: false
        default: "MARKET_LEADERS"
        type: string
      google_creds_json:
        description: "🔐 Service Account JSON (Emergency Only - Prefer Secrets)"
        required: false
        type: string
      enable_debug:
        description: "🐛 Enable Debug Logging"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  actions: read

defaults:
  run:
    shell: bash

env:
  PYTHON_VERSION: "3.11"
  PYTHONUNBUFFERED: 1
  TZ: Asia/Riyadh
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  # =============================================================================
  # ✅ CI TESTS — runs on push/PR (merge blocker)
  # =============================================================================
  ci-tests:
    name: 🧪 CI Tests (Schema Alignment + Contracts)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            requirements.render.txt
            requirements.txt
            requirements.ml.txt

      - name: 📦 Install Dependencies (CI tests)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip setuptools wheel

          if [ -f "requirements.render.txt" ]; then
            python -m pip install -r requirements.render.txt
          elif [ -f "requirements.txt" ]; then
            python -m pip install -r requirements.txt
          else
            echo "::error::No requirements file found (requirements.render.txt or requirements.txt)."
            exit 1
          fi

          python -m pip install -q pytest

      - name: 🧪 Run Tests (hard fail on missing gates)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set -euo pipefail
          echo "::group::CI Tests"

          if [ ! -f "tests/test_schema_alignment.py" ]; then
            echo "::error::Missing required gate: tests/test_schema_alignment.py"
            exit 1
          fi

          if [ -f "test_scoring_engine_contract.py" ]; then
            SCORE_TEST="test_scoring_engine_contract.py"
          elif [ -f "core/test_scoring_engine_contract.py" ]; then
            SCORE_TEST="core/test_scoring_engine_contract.py"
          elif [ -f "tests/test_scoring_engine_contract.py" ]; then
            SCORE_TEST="tests/test_scoring_engine_contract.py"
          else
            echo "::error::test_scoring_engine_contract.py not found (root/core/tests)."
            exit 1
          fi

          python -m pytest -q "$SCORE_TEST" tests/test_schema_alignment.py
          echo "::endgroup::"

  # =============================================================================
  # Scheduled/Manual SYNC workflow (production automation)
  # =============================================================================
  preflight-validation:
    name: 🛡️ Pre-flight Validation
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    outputs:
      validated: ${{ steps.validate.outputs.validated }}

    steps:
      - name: ✅ Validate Runner Environment
        id: validate
        run: |
          set -euo pipefail
          echo "::group::System Information"
          echo "OS: $(uname -a)"
          df -h /
          free -h || true
          echo "::endgroup::"

          MISSING_TOOLS=()
          for tool in curl jq python3 pip3; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              MISSING_TOOLS+=("$tool")
            fi
          done

          if [ ${#MISSING_TOOLS[@]} -ne 0 ]; then
            echo "::error::Missing required tools: ${MISSING_TOOLS[*]}"
            exit 1
          fi

          echo "validated=true" >> "$GITHUB_OUTPUT"

  sync-dashboard:
    name: 🚀 Data Sync
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 25
    needs: preflight-validation
    if: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && needs.preflight-validation.outputs.validated == 'true' }}

    steps:
      - name: 📥 Secure Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            requirements.render.txt
            requirements.txt
            requirements.ml.txt

      - name: 📦 Install Dependencies
        run: |
          set -euo pipefail
          echo "::group::Pip Install Log"
          python -m pip install --upgrade pip setuptools wheel

          if [ -f "requirements.render.txt" ]; then
            python -m pip install -r requirements.render.txt
          elif [ -f "requirements.txt" ]; then
            python -m pip install -r requirements.txt
          else
            echo "::error::No requirements file found (requirements.render.txt or requirements.txt)."
            exit 1
          fi
          echo "::endgroup::"

      - name: 🧪 Run Contract + Schema Alignment Tests (sync guard)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set -euo pipefail
          echo "::group::Tests"
          python -c "import pytest" 2>/dev/null || python -m pip install -q pytest

          if [ -f "test_scoring_engine_contract.py" ]; then
            python -m pytest -q test_scoring_engine_contract.py
          elif [ -f "core/test_scoring_engine_contract.py" ]; then
            python -m pytest -q core/test_scoring_engine_contract.py
          elif [ -f "tests/test_scoring_engine_contract.py" ]; then
            python -m pytest -q tests/test_scoring_engine_contract.py
          else
            echo "::error::test_scoring_engine_contract.py not found (root/core/tests)."
            exit 1
          fi

          # schema drift gate (warning-only for scheduler to avoid cron spam)
          if [ -f "tests/test_schema_alignment.py" ]; then
            python -m pytest -q tests/test_schema_alignment.py || echo "::warning::Schema alignment test failed (scheduler continues)."
          else
            echo "::warning::tests/test_schema_alignment.py not found; schema drift gate not running in scheduler."
          fi
          echo "::endgroup::"

      - name: ⚙️ Smart Configuration Resolution (robust for schedule + manual)
        id: smart_config
        env:
          INPUT_URL: ${{ github.event.inputs.backend_url }}
          INPUT_SHEET: ${{ github.event.inputs.sheet_id }}
          INPUT_MODE: ${{ github.event.inputs.run_mode }}
          INPUT_KEY: ${{ github.event.inputs.single_key }}
          INPUT_DEBUG: ${{ github.event.inputs.enable_debug }}
          INPUT_CREDS: ${{ github.event.inputs.google_creds_json }}

          VAR_URL: ${{ vars.BACKEND_BASE_URL }}
          VAR_SHEET: ${{ vars.DEFAULT_SPREADSHEET_ID }}
          VAR_DEFAULT_KEYS: ${{ vars.DEFAULT_SYNC_KEYS }}

          SECRET_CREDS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          SECRET_CREDS_B64: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_B64 }}
        run: |
          set -euo pipefail

          get_val() {
            for v in "$@"; do
              if [[ -n "${v:-}" && "$v" != "null" && "$v" != "undefined" ]]; then
                echo "$v"
                return 0
              fi
            done
            return 0
          }

          upper_underscore() {
            # normalize to UPPER_SNAKE (spaces/dashes -> underscores, collapse)
            echo "${1:-}" \
              | tr '[:lower:]' '[:upper:]' \
              | tr ',;|\n\r\t' '      ' \
              | tr ' -' '__' \
              | tr -s '_' \
              | xargs
          }

          normalize_keys_list() {
            # Supports:
            # - space separated: "A B C"
            # - comma/semicolon: "A,B;C"
            # - newline separated
            # - JSON array: ["A","B","C"]
            local raw="$1"
            raw="$(echo "${raw:-}" | tr -d '\r' | xargs || true)"

            if [[ -z "${raw:-}" ]]; then
              echo ""
              return 0
            fi

            # JSON array input
            if echo "$raw" | jq -e 'type=="array"' >/dev/null 2>&1; then
              raw="$(echo "$raw" | jq -r '.[]' | tr '\n' ' ' | xargs || true)"
            fi

            raw="$(upper_underscore "$raw")"
            echo "$raw"
          }

          sanitize_keys() {
            local raw="$1"
            raw="$(normalize_keys_list "$raw")"

            # normalize common aliases (keep it simple/portable)
            raw="$(echo "$raw" | sed 's/TOP10_INVESTMENTS/TOP_10_INVESTMENTS/g')"
            raw="$(echo "$raw" | sed 's/\bTOP10\b/TOP_10_INVESTMENTS/g' || true)"

            # drop forbidden legacy keys (SAFE under set -e)
            raw="$(echo "$raw" | tr ' ' '\n' | grep -v -E '^(KSA_TADAWUL|ADVISOR_CRITERIA)$' || true)"
            raw="$(echo "$raw" | tr '\n' ' ' | xargs || true)"

            # de-dup while preserving order
            raw="$(python - <<'PY'
import os
keys = os.environ.get("RAW_KEYS","").split()
seen=set()
out=[]
for k in keys:
    if k and k not in seen:
        out.append(k); seen.add(k)
print(" ".join(out))
PY
            )"
            echo "$raw"
          }

          validate_keys_allowed() {
            local keys="$1"
            local allowed="MARKET_LEADERS GLOBAL_MARKETS MUTUAL_FUNDS COMMODITIES_FX MY_PORTFOLIO INSIGHTS_ANALYSIS TOP_10_INVESTMENTS DATA_DICTIONARY"
            local bad=()

            for k in $keys; do
              if ! echo " $allowed " | grep -q " $k "; then
                bad+=("$k")
              fi
            done

            if [ ${#bad[@]} -ne 0 ]; then
              echo "::error::Invalid SYNC_KEYS: ${bad[*]} | Allowed: $allowed"
              echo "::notice::Tip: Set vars.DEFAULT_SYNC_KEYS as space or comma separated. JSON array is also supported."
              exit 1
            fi
          }

          echo "::group::🔧 Configuration Resolution"

          # 1) URL
          URL="$(get_val "${INPUT_URL:-}" "${VAR_URL:-}" "https://tadawul-fast-bridge.onrender.com")"
          URL="${URL%/}"
          if [[ ! "$URL" =~ ^https?:// ]]; then
            echo "::error::Invalid URL format: $URL"
            exit 1
          fi
          echo "TARGET_URL=$URL" >> "$GITHUB_ENV"
          echo "✅ Backend URL: $URL"

          # 2) Sheet ID
          SHEET="$(get_val "${INPUT_SHEET:-}" "${VAR_SHEET:-}")"
          if [[ -z "${SHEET:-}" ]]; then
            echo "::error::Spreadsheet ID is empty. Set vars.DEFAULT_SPREADSHEET_ID or pass workflow input sheet_id."
            exit 1
          fi
          echo "TARGET_SHEET_ID=$SHEET" >> "$GITHUB_ENV"
          echo "✅ Sheet ID: $SHEET"

          # 3) Mode & Keys
          MODE="$(get_val "${INPUT_MODE:-}" "full_sync")"
          echo "RUN_MODE=$MODE" >> "$GITHUB_ENV"

          if [[ "$MODE" == "single_key" ]]; then
            KEY="$(get_val "${INPUT_KEY:-}" "MARKET_LEADERS")"
            KEYS="$KEY"
          else
            DEFAULT_KEYS_CANONICAL="MARKET_LEADERS GLOBAL_MARKETS MUTUAL_FUNDS COMMODITIES_FX MY_PORTFOLIO INSIGHTS_ANALYSIS TOP_10_INVESTMENTS DATA_DICTIONARY"
            KEYS="$(get_val "${VAR_DEFAULT_KEYS:-}" "$DEFAULT_KEYS_CANONICAL")"
          fi

          export RAW_KEYS="$KEYS"
          KEYS="$(sanitize_keys "$KEYS")"

          if [[ -z "${KEYS:-}" ]]; then
            echo "::error::SYNC_KEYS resolved to empty (after sanitization)."
            exit 1
          fi

          # hard fail if forbidden slipped in
          if echo "$KEYS" | tr ' ' '\n' | grep -q -E '^(KSA_TADAWUL|ADVISOR_CRITERIA)$'; then
            echo "::error::Forbidden key present in SYNC_KEYS after sanitization."
            exit 1
          fi

          validate_keys_allowed "$KEYS"

          echo "SYNC_KEYS=$KEYS" >> "$GITHUB_ENV"
          echo "📋 Mode: $MODE | Keys: $KEYS"

          # 4) Debug
          DEBUG="$(get_val "${INPUT_DEBUG:-}" "false")"
          echo "ENABLE_DEBUG=$DEBUG" >> "$GITHUB_ENV"

          # 5) Credentials
          RAW_CREDS="$(get_val "${INPUT_CREDS:-}" "${SECRET_CREDS:-}")"
          if [[ -z "${RAW_CREDS:-}" && -n "${SECRET_CREDS_B64:-}" ]]; then
            echo "🔓 Decoding Base64 credentials..."
            RAW_CREDS="$(printf '%s' "$SECRET_CREDS_B64" | base64 --decode 2>/dev/null || true)"
          fi

          if [[ -n "${RAW_CREDS:-}" ]]; then
            # mask only email (avoid multiline add-mask issues)
            SA_EMAIL="$(echo "$RAW_CREDS" | jq -r '.client_email // empty' 2>/dev/null || true)"
            if [[ -n "${SA_EMAIL:-}" ]]; then
              echo "::add-mask::$SA_EMAIL"
            fi

            if echo "$RAW_CREDS" | jq empty >/dev/null 2>&1; then
              CREDS_PATH="$RUNNER_TEMP/google_credentials.json"
              python - <<'PY'
import os, pathlib
p = pathlib.Path(os.environ["CREDS_PATH"])
p.write_text(os.environ["RAW_CREDS"], encoding="utf-8")
PY
              chmod 600 "$CREDS_PATH"
              echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDS_PATH" >> "$GITHUB_ENV"
              echo "🤖 Service Account Configured: ${SA_EMAIL:-Unknown}"
            else
              echo "::error::Invalid JSON structure in credentials."
              exit 1
            fi
          elif [[ "$MODE" != "health_only" ]]; then
            echo "::error::No valid Google credentials found for sync mode."
            exit 1
          fi

          echo "::endgroup::"
        env:
          RAW_CREDS: ${{ github.event.inputs.google_creds_json }}
          CREDS_PATH: ${{ runner.temp }}/google_credentials.json

      - name: 💓 Backend Health Check
        id: health_check
        run: |
          set -euo pipefail
          echo "::group::🏥 Backend Health Check"

          HEALTH_ENDPOINTS=("/readyz" "/health" "/livez")
          MAX_RETRIES=4

          for endpoint in "${HEALTH_ENDPOINTS[@]}"; do
            echo "▶️ Probing $TARGET_URL$endpoint..."
            for attempt in $(seq 1 "$MAX_RETRIES"); do
              BACKOFF=$(( 2 ** attempt ))

              RESPONSE="$(curl -s -w "\n%{http_code}" --max-time 10 "$TARGET_URL$endpoint" 2>&1 || echo -e "\n000")"
              HTTP_CODE="$(echo "$RESPONSE" | tail -n1)"
              BODY="$(echo "$RESPONSE" | sed '$d')"

              if [[ "$HTTP_CODE" =~ ^2[0-9][0-9]$ ]]; then
                echo "✅ Healthy via $endpoint (HTTP $HTTP_CODE)"
                VERSION="$(echo "$BODY" | jq -r '.version // .app_version // .build // "unknown"' 2>/dev/null || echo "unknown")"
                echo "health_status=healthy" >> "$GITHUB_OUTPUT"
                echo "health_version=$VERSION" >> "$GITHUB_OUTPUT"
                echo "::endgroup::"
                exit 0
              fi

              echo "⏳ Attempt $attempt/$MAX_RETRIES: HTTP $HTTP_CODE, retrying in ${BACKOFF}s..."
              sleep "$BACKOFF"
            done
          done

          echo "::warning::All health check endpoints failed. Backend may be degraded."
          echo "health_status=degraded" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"

      - name: 🚀 Execute Dashboard Sync
        id: execute_sync
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set -euo pipefail
          echo "::group::📊 Sync Execution"

          if [ ! -f "scripts/run_dashboard_sync.py" ]; then
            echo "::error::Missing scripts/run_dashboard_sync.py"
            exit 1
          fi

          CMD=(python scripts/run_dashboard_sync.py)
          CMD+=(--backend "$TARGET_URL")
          CMD+=(--sheet-id "$TARGET_SHEET_ID")
          CMD+=(--keys $SYNC_KEYS)

          if [[ "${RUN_MODE:-full_sync}" == "health_only" ]]; then
            CMD+=(--dry-run)
          fi

          if [[ "${ENABLE_DEBUG:-false}" == "true" ]]; then
            export LOG_LEVEL=DEBUG
            echo "🔍 Debug mode active (LOG_LEVEL=DEBUG)."
          fi

          echo "⏱️ Start Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "📋 Command: ${CMD[*]}"

          set -o pipefail
          TIMESTAMP="$(date +%Y%m%d_%H%M%S)"
          LOG_FILE="sync_${TIMESTAMP}.log"

          START_TIME="$(date +%s)"
          "${CMD[@]}" 2>&1 | tee "$LOG_FILE"
          EXIT_CODE=$?
          END_TIME="$(date +%s)"
          DURATION=$((END_TIME - START_TIME))

          echo "duration=$DURATION" >> "$GITHUB_OUTPUT"
          echo "✅ Execution finished in ${DURATION}s (Exit Code: $EXIT_CODE)"

          if grep -qiE "RateLimitError|Quota exceeded|429 Too Many Requests|HTTP 429" "$LOG_FILE"; then
            echo "::warning::Rate limiting detected in logs."
            echo "rate_limited=true" >> "$GITHUB_OUTPUT"
          fi

          if grep -qiE "AuthenticationError|InvalidGrant|401 Unauthorized|403 Forbidden" "$LOG_FILE"; then
            echo "::error::Google Sheets authentication/permission issue detected."
            EXIT_CODE=1
          fi

          cp "$LOG_FILE" sync_execution.log
          echo "::endgroup::"

          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Sync script failed. See logs above."
            exit $EXIT_CODE
          fi

      - name: 📝 Generate Summary
        if: always()
        run: |
          set -euo pipefail
          RIYADH_TIME="$(TZ=Asia/Riyadh date '+%Y-%m-%d %H:%M:%S %Z')"
          STATUS_ICON="$([[ "${{ job.status }}" == "success" ]] && echo "✅ **SUCCESS**" || echo "❌ **FAILED**")"

          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          # 🏦 Tadawul Dashboard Sync Report

          ## 📋 Execution Overview
          | Metric | Value |
          | :--- | :--- |
          | **Status** | $STATUS_ICON |
          | **Trigger** | \`${{ github.event_name }}\` |
          | **Time (Riyadh)** | \`$RIYADH_TIME\` |
          | **Run Mode** | \`${{ env.RUN_MODE }}\` |
          | **Duration** | \`${{ steps.execute_sync.outputs.duration || '0' }} seconds\` |

          ## 🎯 Target
          * **Sheet ID:** \`${{ env.TARGET_SHEET_ID }}\`
          * **Backend:** \`${{ env.TARGET_URL }}\` *(Health: ${{ steps.health_check.outputs.health_status || 'Unknown' }})*

          ## 🔑 SYNC_KEYS
          \`\`\`text
          ${{ env.SYNC_KEYS }}
          \`\`\`
          EOF

      - name: 📤 Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tadawul-sync-logs-${{ github.run_id }}
          path: |
            sync_*.log
            sync_execution.log
          retention-days: 7
          compression-level: 6
          if-no-files-found: warn

      - name: 🧹 Secure Cleanup
        if: always()
        run: |
          set -euo pipefail
          echo "::group::Cleanup"
          if [[ -n "${GOOGLE_APPLICATION_CREDENTIALS:-}" && -f "${GOOGLE_APPLICATION_CREDENTIALS:-}" ]]; then
            if command -v shred >/dev/null 2>&1; then
              shred -u -z "$GOOGLE_APPLICATION_CREDENTIALS" 2>/dev/null || rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
            else
              rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
            fi
            echo "✅ Google Credentials removed from runner."
          fi
          echo "::endgroup::"
