# .github/workflows/tests.yml
# Foundation test CI for the statistics + decision-layer modules.
#
# WHY THIS EXISTS
#   core/stats.py and core/quality_gates.py are verified today, but nothing runs
#   their suites automatically — the next unrelated change could silently break
#   them. This job keeps the foundations green.
#
# WHY THE INSTALL IS DELIBERATELY LEAN
#   Only numpy (the production pin) + pytest are installed — no scipy, gspread,
#   or pandas. That is intentional: it forces CI to exercise the pure-numpy
#   statistical fallbacks and the graceful-degradation paths (Sheets/gspread
#   absent) that run in the lean web image. If these pass with nothing but
#   numpy, they pass everywhere.
#
#   It runs ONLY the foundation suites, not the whole tests/ directory, so it
#   does not pull in the heavy live-dependent tests (pandas, credentials,
#   provider I/O). Those belong to a separate, heavier workflow.
#
#   core/analysis/opportunity_builder.py is included here because it is pure
#   stdlib (json/math/os/re/datetime — no numpy, pandas, or I/O), so its
#   contract suite runs in the same lean image. This guards the funding /
#   selection gates that now run in production (engine-ROI ordering, the
#   minimum-ticket floor, unfunded-watch, and the floor near-miss labeling)
#   against a silent regression.
#
# MAINTENANCE NOTE
#   Earlier revisions also gated core/investment_advisor.py + scripts/calibrator.py
#   and their suites (test_calibrator.py, test_advisor_cost_basis_gate.py). Those
#   modules/tests were removed from the repo (calibrator superseded by the live
#   ReliabilityCalibrator in scripts/track_performance.py; the orphaned advisor
#   module deleted). All references to them are dropped here so the workflow no
#   longer fails on missing files.

name: foundations-tests

on:
  push:
    paths:
      - 'core/stats.py'
      - 'core/quality_gates.py'
      - 'core/analysis/opportunity_builder.py'
      - 'tests/test_stats.py'
      - 'tests/test_quality_gates.py'
      - 'tests/test_opportunity_builder.py'
      - '.github/workflows/tests.yml'
  pull_request:
    paths:
      - 'core/stats.py'
      - 'core/quality_gates.py'
      - 'core/analysis/opportunity_builder.py'
      - 'tests/test_stats.py'
      - 'tests/test_quality_gates.py'
      - 'tests/test_opportunity_builder.py'
  workflow_dispatch: {}

jobs:
  foundations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal deps (numpy + pytest only)
        run: |
          python -m pip install -U pip
          python -m pip install "numpy>=1.26.4,<2.0.0" pytest

      - name: Syntax gate (compile foundations)
        run: python -m py_compile core/stats.py core/quality_gates.py core/analysis/opportunity_builder.py core/analysis/portfolio_actions.py

      - name: Run foundation test suites
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest -q \
            tests/test_stats.py \
            tests/test_quality_gates.py \
            tests/test_opportunity_builder.py \
            tests/test_portfolio_actions.py \
            tests/test_current_schema_contract.py \
            tests/test_recent_fixes.py \
            tests/test_harness_ic.py \
            tests/test_scoring_engine_contract.py
