# .github/workflows/ci.yml
# ============================================================================
# TFB UNIVERSAL CI — every production-critical file, every push
# ============================================================================
# VERSION 1.0.0 (2026-07-24) — NEW WORKFLOW
#
# WHY THIS EXISTS (root-cause evidence, verified live on main 2026-07-24):
#
#   1. tests/test_portfolio_actions.py EXISTS in the repository (527 lines,
#      pure stdlib + unittest) and NOTHING RUNS IT.
#        - tests.yml path filter covers only core/stats.py, core/quality_gates.py,
#          core/analysis/opportunity_builder.py and three test files. A commit
#          touching ONLY core/analysis/portfolio_actions.py matches nothing, so
#          the workflow never fires. Its py_compile step on line 41 does list
#          portfolio_actions.py — but that line is unreachable for exactly the
#          commits that need it.
#        - daily_sync.yml DOES fire on every push, but its ci-tests job runs only
#          test_scoring_engine_contract.py, test_schema_alignment.py and
#          test_recent_fixes.py. None of them import portfolio_actions.
#      Net effect: portfolio_actions.py went 1.4.0 -> 1.7.1 in three days — the
#      module that decides EXIT / TRIM / ADD on live capital — with ZERO of its
#      own tests ever executing. The suite was written, committed, and orphaned.
#
#   2. The same hole covers main.py, routes/advanced_analysis.py,
#      scripts/verify_deployment.py, scripts/run_dashboard_sync.py,
#      scripts/track_performance.py and scripts/run_daily_brief.py.
#
#   Under the Gate & Evidence Register §5, a defect shipped into the decision
#   layer during the window is an engine-caused integrity failure: TAINTED day
#   -> window RESTART (~4 weeks). This workflow is the cheapest available
#   insurance against that outcome, and it changes ZERO production behaviour:
#   it reads the repository and runs tests. It writes nothing, deploys nothing,
#   touches no workbook, needs no secrets, and requires no ENV change.
#
# WHY IT IS A SEPARATE FILE AND NOT AN EDIT TO daily_sync.yml
#   daily_sync.yml now holds a single write lease on the production workbook
#   (concurrency fix, same date). CI living inside that workflow would queue
#   behind a 115-minute sync before reporting. As its own workflow with its own
#   concurrency group, CI reports in ~2 minutes regardless of what the sync is
#   doing. The two changes are designed to compose.
#
# WHY THE TEST LIST IS EXPLICIT AND NOT `pytest tests/`
#   Deliberate. Two suites in tests/ cannot pass in a bare CI image and would
#   turn this gate permanently red — and a gate that cries wolf is worse than no
#   gate (the lesson verify_deployment.py v1.0.14 learned the same day):
#     - tests/test_endpoints.py is a LIVE smoke-test CLI (argparse + requests)
#       that expects a running backend. It is a tool, not a unit suite. It is
#       the natural seed for a post-window authenticated smoke workflow and is
#       intentionally excluded here.
#     - tests/test_data_engine_v2.py imports the 738 KB engine and its provider
#       stack. It runs in the `heavy` job below as REPORT-ONLY until proven
#       green, then gets promoted to blocking post-window.
#   Adding a suite to the blocking jobs is a deliberate act with evidence, never
#   a wildcard.
#
# RELATIONSHIP TO tests.yml
#   tests.yml (foundations-tests) is left untouched and now overlaps this file.
#   That redundancy is accepted on purpose: nothing working gets modified inside
#   the evidence window. Retiring it is a post-2026-08-16 cleanup item.
#
# ROLLBACK: delete this file. No other file depends on it.
# ============================================================================

name: ✅ CI

on:
  push:
    paths:
      - 'main.py'
      - 'core/**'
      - 'routes/**'
      - 'scripts/**'
      - 'tests/**'
      - 'requirements*.txt'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'main.py'
      - 'core/**'
      - 'routes/**'
      - 'scripts/**'
      - 'tests/**'
      - 'requirements*.txt'
      - '.github/workflows/**'
  workflow_dispatch:

# Own group, deliberately NOT shared with the sync workflow's workbook lease.
# cancel-in-progress is safe here: CI writes nothing, so pre-empting a
# superseded run costs nothing and gives faster feedback on the newest commit.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:

  # ==========================================================================
  # JOB 1 — syntax floor across the ENTIRE codebase (BLOCKING)
  # ==========================================================================
  # compileall imports nothing, so it needs no dependencies and cannot be
  # defeated by a missing provider or absent credentials. It is the one check
  # that covers all 111 Python files including the ones no suite touches.
  compile:
    name: 🧱 Compile all production code
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 🧱 compileall — main.py, core/, routes/, scripts/
        run: |
          echo "::group::compileall"
          python -m compileall -q main.py core routes scripts
          echo "::endgroup::"
          echo "✅ every production file parses"

      - name: 🧱 compileall — tests/
        run: |
          python -m compileall -q tests
          echo "✅ every test file parses"

  # ==========================================================================
  # JOB 2 — decision-layer unit suites (BLOCKING)
  # ==========================================================================
  # Lean install (numpy + pytest only) is inherited from tests.yml on purpose:
  # it forces the pure-numpy statistical fallbacks and the graceful-degradation
  # paths (gspread/pandas absent) to be exercised, exactly as they run in the
  # lean web image. If these pass on numpy alone, they pass everywhere.
  #
  # tests/conftest.py bootstraps the repo root onto sys.path (line 48), and
  # `python -m pytest` is used rather than bare `pytest` so the working
  # directory is importable. Both are required for `from core...` to resolve.
  lean-unit:
    name: 🧪 Decision-layer suites (lean)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install minimal deps (numpy + pytest only)
        run: |
          python -m pip install -U pip
          python -m pip install "numpy>=1.26.4,<2.0.0" pytest

      - name: 🎯 py_compile the decision layer
        run: |
          python -m py_compile \
            core/stats.py \
            core/quality_gates.py \
            core/scoring.py \
            core/analysis/opportunity_builder.py \
            core/analysis/portfolio_actions.py

      - name: 🧪 Run decision-layer suites
        run: |
          echo "::group::pytest (lean)"
          python -m pytest -q \
            tests/test_stats.py \
            tests/test_quality_gates.py \
            tests/test_opportunity_builder.py \
            tests/test_recent_fixes.py \
            tests/test_portfolio_actions.py \
            tests/test_scoring_engine_contract.py
          echo "::endgroup::"

      - name: ✅ Coverage note
        run: |
          echo "portfolio_actions suite executed — the gap this workflow exists to close."

  # ==========================================================================
  # JOB 3 — schema / route contract (BLOCKING)
  # ==========================================================================
  # test_schema_alignment.py builds a FastAPI TestClient, so it needs fastapi +
  # httpx. Separated from the lean job so a FastAPI packaging problem can never
  # be misread as a decision-layer regression.
  contract:
    name: 📐 Schema & route contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install contract deps
        run: |
          python -m pip install -U pip
          python -m pip install "numpy>=1.26.4,<2.0.0" pytest fastapi httpx pydantic

      - name: 📐 Run schema alignment
        run: |
          echo "::group::pytest (contract)"
          python -m pytest -q tests/test_schema_alignment.py
          echo "::endgroup::"

  # ==========================================================================
  # JOB 4 — data engine (REPORT-ONLY, NON-BLOCKING)
  # ==========================================================================
  # tests/test_data_engine_v2.py guards the largest and most consequential
  # module in the repository (738 KB) and is currently run by nothing at all.
  # It installs the full requirements.txt, so it is the most likely job to fail
  # for reasons unrelated to code quality (provider I/O, absent credentials,
  # heavy dependency resolution).
  #
  # continue-on-error: true is a DELIBERATE, TEMPORARY setting. It buys
  # visibility today without the risk of a permanently red gate that trains the
  # operator to ignore CI. The moment this job is observed green on main, it is
  # promoted to blocking by deleting the continue-on-error line — a one-line
  # change, logged, post-window.
  heavy:
    name: ⚙️ Data engine suite (report-only)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install full requirements
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: ⚙️ Run data engine suite
        run: |
          echo "::group::pytest (heavy)"
          python -m pytest -q tests/test_data_engine_v2.py
          echo "::endgroup::"

      - name: ℹ️ Status note
        if: always()
        run: |
          echo "REPORT-ONLY. A failure here does not block the merge yet."
          echo "Promote to blocking by deleting 'continue-on-error: true' once green."

  # ==========================================================================
  # JOB 5 — gate summary
  # ==========================================================================
  # Single line in the Actions tab answering 'did the things that guard money
  # actually run', so the answer never has to be reconstructed from three
  # separate job logs.
  summary:
    name: 📋 CI verdict
    runs-on: ubuntu-latest
    needs: [compile, lean-unit, contract]
    if: always()
    steps:
      - name: 📋 Print verdict
        run: |
          echo "compile   : ${{ needs.compile.result }}"
          echo "lean-unit : ${{ needs.lean-unit.result }}"
          echo "contract  : ${{ needs.contract.result }}"
          if [ "${{ needs.compile.result }}" = "success" ] \
          && [ "${{ needs.lean-unit.result }}" = "success" ] \
          && [ "${{ needs.contract.result }}" = "success" ]; then
            echo "VERDICT: CLEAN — decision layer verified on this commit."
          else
            echo "VERDICT: FAIL — do not deploy this commit."
            exit 1
          fi
